<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Condo Bot</title>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #2196F3;
            --border: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-card {
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #fff; font-weight: 600; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 0.9rem; }
        input {
            width: 100%; padding: 12px; background-color: #121212; border: 1px solid var(--border);
            border-radius: 5px; color: #fff; font-size: 1rem; transition: border 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }
        
        .login-btn {
            width: 100%; background-color: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 5px; font-size: 1rem; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .login-btn:hover { background-color: #0b7dda; }
        
        .error-msg { color: #f44336; font-size: 0.9rem; text-align: center; margin-top: 15px; display: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-card">
        <h2>🔒 เจ้าหน้าที่หลังบ้าน</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
            <div class="error-msg" id="errorMsg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    // ล็อกอินสำเร็จ ย้ายไปหน้าแดชบอร์ด
                    window.location.href = '/admin';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
            }
        });
    </script>
</body>
</html>
